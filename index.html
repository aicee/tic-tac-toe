<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Ceecee's 1st app -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Tic Tac Toe</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-sky-100 to-sky-300">
    <!-- Alerts -->
    <div class="fixed inset-0 flex flex-col items-center justify-center pointer-events-none">
      <div id="winAlert" class="px-6 py-3 bg-green-600 text-white text-xl rounded-lg shadow-lg invisible opacity-0 scale-90 transform transition-all duration-300">YOU WIN!! 🎉</div>
      <div id="drawAlert" class="px-6 py-3 bg-yellow-500 text-white text-xl rounded-lg shadow-lg invisible opacity-0 scale-90 transform transition-all duration-300 mt-4">~~ TIE ~~</div>
    </div>

    <div class="bg-white/80 backdrop-blur-md p-6 rounded-xl shadow-xl w-full max-w-md">
      <h1 class="text-center text-4xl font-bold text-sky-700 mb-6">Tic Tac Toe</h1>

      <!-- Player Inputs -->
      <div class="grid grid-cols-2 gap-4 mb-4">
        <div class="flex flex-col items-center">
          <label for="player1" class="text-sky-800">Player 1 (X)</label>
          <input type="text" id="player1" placeholder="Enter name" class="mt-1 w-full px-2 py-1 border rounded text-center" />
          <div class="mt-1 text-2xl font-bold text-sky-700" id="score1">0</div>
        </div>
        <div class="flex flex-col items-center">
          <label for="player2" class="text-sky-800">Player 2 (O)</label>
          <input type="text" id="player2" placeholder="Enter name" class="mt-1 w-full px-2 py-1 border rounded text-center" />
          <div class="mt-1 text-2xl font-bold text-sky-700" id="score2">0</div>
        </div>
      </div>

      <div id="gameStatus" class="text-center text-lg font-semibold text-sky-800 my-4"></div>

      <!-- Game Board -->
      <main>
        <div class="grid grid-cols-3 gap-3">
          <button id="box1" onclick="playTurn(0)" class="box w-24 h-24 flex items-center justify-center bg-white/70 hover:bg-sky-300 rounded-lg shadow text-4xl font-bold transition-colors"></button>
          <button id="box2" onclick="playTurn(1)" class="box w-24 h-24 flex items-center justify-center bg-white/70 hover:bg-sky-300 rounded-lg shadow text-4xl font-bold transition-colors"></button>
          <button id="box3" onclick="playTurn(2)" class="box w-24 h-24 flex items-center justify-center bg-white/70 hover:bg-sky-300 rounded-lg shadow text-4xl font-bold transition-colors"></button>
          <button id="box4" onclick="playTurn(3)" class="box w-24 h-24 flex items-center justify-center bg-white/70 hover:bg-sky-300 rounded-lg shadow text-4xl font-bold transition-colors"></button>
          <button id="box5" onclick="playTurn(4)" class="box w-24 h-24 flex items-center justify-center bg-white/70 hover:bg-sky-300 rounded-lg shadow text-4xl font-bold transition-colors"></button>
          <button id="box6" onclick="playTurn(5)" class="box w-24 h-24 flex items-center justify-center bg-white/70 hover:bg-sky-300 rounded-lg shadow text-4xl font-bold transition-colors"></button>
          <button id="box7" onclick="playTurn(6)" class="box w-24 h-24 flex items-center justify-center bg-white/70 hover:bg-sky-300 rounded-lg shadow text-4xl font-bold transition-colors"></button>
          <button id="box8" onclick="playTurn(7)" class="box w-24 h-24 flex items-center justify-center bg-white/70 hover:bg-sky-300 rounded-lg shadow text-4xl font-bold transition-colors"></button>
          <button id="box9" onclick="playTurn(8)" class="box w-24 h-24 flex items-center justify-center bg-white/70 hover:bg-sky-300 rounded-lg shadow text-4xl font-bold transition-colors"></button>
        </div>

        <div class="flex justify-center space-x-4 mt-6">
          <button onclick="resetBoard()" class="px-4 py-2 bg-sky-600 hover:bg-sky-700 text-white rounded-lg shadow">New Game</button>
          <button onclick="resetScores()" class="px-4 py-2 bg-red-500 hover:bg-red-600 text-white rounded-lg shadow">Reset Scores</button>
        </div>
      </main>
    </div>

    <script src="./tictactoe.js"></script>
  </body>
</html>
